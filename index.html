<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Urban Oasis is a minimal e-commerce store for curated everyday products"/>
    <title>Urban Oasis | Home</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar" aria-label="Main navigation">
        <a href="/index.html" class="logo">
          <img src="icons/BrandLogo.svg" alt="Urban Oasis logo" />
        </a>

        <ul class="nav-links">
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-actions">
          <button aria-label="Search" class="icon-button search-button">
            <img src="icons/SearchIcon.svg" alt="Search" />
          </button>

          <a href="/cart/index.html" class="icon-button" aria-label="Cart">
            <img src="icons/CartIcon.svg" alt="Cart" />
          </a>

          <a
            href="/account/login.html"
            class="icon-button"
            aria-label="Account"
          >
            <img src="icons/ProfileIcon.svg" alt="Account" />
          </a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero-carousel" aria-label="Featured products carousel">
        <div class="carousel-track" id="carousel-track">
          <!-- Carousel is rendered here with JavaScript-->
        </div>

        <div class="carousel-controls">
          <button
            class="carousel-btn carousel-btn-prev"
            id="carousel-prev"
            aria-label="Previous slide"
          >
            <img src="icons/ArrowLeft.svg" alt="Previous" />
          </button>

          <button
            class="carousel-btn carousel-btn-next"
            id="carousel-next"
            aria-label="Next slide"
          >
            <img src="icons/ArrowRight.svg" alt="Next" />
          </button>
        </div>
      </section>

      <section
        class="featured-products"
        aria-labelledby="featured-products-title"
      >
        <div class="section-header">
          <p class="section-label">Shop the collection</p>
          <h1 id="featured-products-title">Featured Products</h1>
          <p>Explore our selection of everday essentials.</p>
        </div>

        <p class="loading-message" id="products-loading">Loading products</p>
        <p class="error-message" id="products-error" hidden>
          Sorry, we could not load the products
        </p>

        <div class="product-grid" id="product-grid">
          <!-- Products rendered here with JavaScript -->
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <a href="/index.html" class="footer-logo">
        <img src="icons/BrandLogo.svg" alt="Urban Oasis logo" />
      </a>

      <p class="copyright">&copy; 2026 Urban Oasis</p>

      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Terms Of Service</a>
        <a href="#">FAQ</a>
      </nav>
    </footer>

    <script src="/js/index.js" type="module"></script>
  </body>
</html>
