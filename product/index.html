<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="View product detail, reviews, pricing and add items to you Urban Oasis cart." />
    <title>Urban Oasis | Product</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/product.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar" aria-label="Main navigation">
        <a href="../index.html" class="logo">
          <img src="../icons/BrandLogo.svg" alt="Urban Oasis logo" />
        </a>

        <ul class="nav-links">
          <li><a href="#">About</a></li>
          <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-actions">
          <button aria-label="Search" class="icon-button search-button">
            <img src="../icons/SearchIcon.svg" alt="Search" />
          </button>

          <a href="../cart/index.html" class="icon-button" aria-label="Cart">
            <img src="../icons/CartIcon.svg" alt="Cart" />
          </a>

          <a href="../account/login.html" class="icon-button" aria-label="Account">
            <img src="../icons/ProfileIcon.svg" alt="Account" />
          </a>
        </div>
      </nav>
    </header>

    <main>
      <section class="product-detail" aria-labelledby="product-title">
        <p class="loading-message" id="product-loading">Loading Product...</p>
        <p class="error-message" id="product-error" hidden>
          Sorry, we could not load this product.
        </p>
        <div class="product-layout" id="product-layout">
          <!-- Product details are rendered here with JavaScript -->
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <a href="../index.html" class="footer-logo">
        <img src="../icons/BrandLogo.svg" alt="Urban Oasis logo" />
      </a>

      <p class="copyright">&copy; 2026 Urban Oasis</p>

      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Terms Of Service</a>
        <a href="#">FAQ</a>
      </nav>
    </footer>

    <script src="../js/product.js" type="module"></script>
  </body>
</html>
